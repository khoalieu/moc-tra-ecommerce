version: '3.9'

services:
  # ===================================================
  # Ứng dụng Java/Tomcat
  # ===================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moctra_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Database
      - DB_URL=jdbc:mysql://db:3306/moctra_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      - DB_USER=moctra
      - DB_PASSWORD=${DB_PASSWORD}
      # GHN
      - GHN_TOKEN=${GHN_TOKEN}
      - GHN_SHOP_ID=${GHN_SHOP_ID}
      # Email
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      # PayOS
      - PAYOS_CLIENT_ID=${PAYOS_CLIENT_ID}
      - PAYOS_API_KEY=${PAYOS_API_KEY}
      - PAYOS_CHECKSUM_KEY=${PAYOS_CHECKSUM_KEY}
      # App URL (dùng cho webhook, redirect)
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8080}
    volumes:
      # Mount thư mục upload ảnh để persist dữ liệu
      - app_uploads:/usr/local/tomcat/webapps/ROOT/assets/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - moctra_network

  # ===================================================
  # MySQL Database
  # ===================================================
  db:
    image: mysql:8.0
    container_name: moctra_db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=moctra_db
      - MYSQL_USER=moctra
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - TZ=Asia/Ho_Chi_Minh
    ports:
      - "3307:3306"   # 3307 trên host để tránh xung đột với MySQL local
    volumes:
      - db_data:/var/lib/mysql
      - ./Database/migrations:/docker-entrypoint-initdb.d:ro   # Auto-import SQL khi khởi tạo lần đầu
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "moctra", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - moctra_network

  # ===================================================
  # Nginx - Reverse Proxy
  # ===================================================
  nginx:
    image: nginx:alpine
    container_name: moctra_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - app
    networks:
      - moctra_network

volumes:
  db_data:
    driver: local
  app_uploads:
    driver: local
  nginx_cache:
    driver: local

networks:
  moctra_network:
    driver: bridge
