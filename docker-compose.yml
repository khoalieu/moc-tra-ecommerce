services:
  mysql:
    image: mysql:8.0
    container_name: moctra-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: moctra_db
      MYSQL_USER: moctra
      MYSQL_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./Database/moctra_db_latest.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "moctra", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: moctra-web
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8080"

volumes:
  mysql_data: